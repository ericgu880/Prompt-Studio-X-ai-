<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PromptStudio 设置中心 UI 原型</title>
  <style>
    :root{
      --bg:#0b0b0c;
      --panel:#141416;
      --panel-2:#1a1a1d;
      --panel-3:#202024;
      --line:#2c2c31;
      --line-soft:#232328;
      --text:#f4f4f5;
      --muted:#a7a7ad;
      --subtle:#74747c;
      --accent:#ffffff;
      --accent-text:#0d0d0f;
      --good:#9ce6b5;
      --warn:#ffd48a;
      --danger:#ff8b8b;
      --info:#b8d9ff;
      --shadow: 0 20px 80px rgba(0,0,0,.35);
      --radius:18px;
      --radius-sm:12px;
      --sidebar:286px;
      --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;}
    body{overflow:hidden;}
    .app{height:100%;display:grid;grid-template-columns:var(--sidebar) 1fr;background:linear-gradient(130deg,#09090a 0%,#101012 45%,#0a0a0b 100%);}
    .sidebar{height:100%;background:rgba(29,29,31,.92);border-right:1px solid var(--line);display:flex;flex-direction:column;min-width:0;}
    .window-dots{display:flex;gap:8px;padding:18px 18px 0;}
    .dot{width:12px;height:12px;border-radius:50%;background:#5c5c61}.dot:nth-child(1){background:#56565b}.dot:nth-child(2){background:#4d4d52}.dot:nth-child(3){background:#414146}
    .brand{display:flex;align-items:center;gap:12px;padding:20px 18px 14px;}
    .brand-mark{width:42px;height:42px;border-radius:14px;background:#f7f7f8;color:#111;display:grid;place-items:center;font-weight:900;box-shadow:0 10px 30px rgba(255,255,255,.05)}
    .brand h1{font-size:18px;margin:0;line-height:1.1}.brand p{margin:4px 0 0;color:var(--muted);font-size:12px}
    .side-search{padding:0 14px 14px;position:relative;}
    .side-search input{width:100%;height:38px;border-radius:12px;border:1px solid var(--line);background:#101012;color:var(--text);padding:0 12px 0 34px;outline:none;}
    .side-search:before{content:"⌕";position:absolute;left:26px;top:9px;color:var(--muted);font-size:16px;}
    .nav{overflow:auto;padding:0 12px 18px;}
    .nav-group{margin:10px 0 16px;}
    .nav-group-title{font-size:12px;color:#85858c;letter-spacing:.06em;margin:8px 8px 8px;text-transform:uppercase;}
    .nav-item{height:40px;display:flex;align-items:center;gap:10px;padding:0 10px;border-radius:12px;color:#d6d6da;text-decoration:none;margin:3px 0;border:1px solid transparent;position:relative;}
    .nav-item:hover{background:#242428}.nav-item.active{background:#f4f4f5;color:#111;border-color:#fff;font-weight:700;}
    .nav-icon{width:22px;text-align:center;font-size:15px}.nav-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.nav-badge{margin-left:auto;color:#8e8e95;font-size:11px}.nav-item.active .nav-badge{color:#555}
    .sidebar-footer{margin-top:auto;border-top:1px solid var(--line);padding:12px 14px 14px;}
    .library-pill{display:flex;align-items:center;gap:10px;background:#111113;border:1px solid var(--line);border-radius:14px;padding:10px 12px;}
    .library-pill strong{display:block;font-size:13px}.library-pill span{display:block;color:var(--muted);font-size:12px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:190px}.pulse{width:9px;height:9px;border-radius:50%;background:var(--good);box-shadow:0 0 0 4px rgba(156,230,181,.12)}
    .main{height:100%;display:flex;flex-direction:column;min-width:0;}
    .topbar{height:76px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--line-soft);padding:0 28px;background:rgba(10,10,11,.58);backdrop-filter:blur(16px);}
    .crumb{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;white-space:nowrap}.crumb strong{color:var(--text);font-size:16px}.divider{width:1px;height:22px;background:var(--line);margin:0 2px}
    .global-search{flex:1;max-width:620px;position:relative;}.global-search input{width:100%;height:42px;border-radius:14px;border:1px solid var(--line);background:#131316;color:var(--text);padding:0 14px 0 40px;outline:none;}.global-search:before{content:"⌘K";position:absolute;right:12px;top:10px;color:#777;font-size:12px;border:1px solid #34343a;border-radius:7px;padding:2px 6px;background:#0e0e10}.global-search:after{content:"⌕";position:absolute;left:15px;top:9px;color:var(--muted);font-size:17px;}
    .top-actions{margin-left:auto;display:flex;align-items:center;gap:10px}.btn{height:36px;padding:0 14px;border-radius:999px;border:1px solid var(--line);background:#1d1d21;color:#f2f2f3;font-weight:650;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;text-decoration:none;white-space:nowrap}.btn:hover{background:#28282d}.btn.primary{background:#f6f6f6;color:#0e0e10;border-color:#fff}.btn.ghost{background:#141416}.btn.danger{background:rgba(255,139,139,.1);color:#ffb2b2;border-color:rgba(255,139,139,.24)}.btn.small{height:30px;padding:0 11px;font-size:12px}.btn.square{width:36px;padding:0}
    .content{overflow:auto;padding:28px;}
    .page{max-width:1160px;margin:0 auto 60px;}
    .hero{background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.022));border:1px solid var(--line);border-radius:24px;padding:26px 28px;margin-bottom:18px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
    .hero:after{content:"";position:absolute;right:-120px;top:-160px;width:420px;height:420px;background:radial-gradient(circle,rgba(255,255,255,.12),transparent 60%);pointer-events:none}.hero h2{font-size:30px;margin:0 0 8px;letter-spacing:-.02em}.hero p{margin:0;color:#c4c4c8;line-height:1.65;max-width:780px}.hero-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}.chip{display:inline-flex;align-items:center;gap:6px;min-height:26px;padding:4px 10px;border-radius:999px;background:#232328;border:1px solid #33343a;color:#dadade;font-size:12px}.chip.good{color:#b9f3ca;background:rgba(156,230,181,.08);border-color:rgba(156,230,181,.22)}.chip.warn{color:#ffe1a8;background:rgba(255,212,138,.08);border-color:rgba(255,212,138,.24)}.chip.info{color:#cbe4ff;background:rgba(184,217,255,.08);border-color:rgba(184,217,255,.24)}.chip.danger{color:#ffb2b2;background:rgba(255,139,139,.08);border-color:rgba(255,139,139,.24)}
    .grid{display:grid;gap:14px}.grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}.grid.auto{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
    .card{background:rgba(25,25,28,.86);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 10px 38px rgba(0,0,0,.16);}.card h3{margin:0 0 8px;font-size:16px}.card p{margin:0;color:var(--muted);line-height:1.55}.stat-value{font-size:26px;font-weight:800;letter-spacing:-.03em;margin:8px 0 4px}.stat-caption{font-size:12px;color:var(--subtle)}
    .section{background:rgba(20,20,22,.78);border:1px solid var(--line);border-radius:22px;margin:16px 0;overflow:hidden;}.section-head{padding:18px 20px;border-bottom:1px solid var(--line-soft);display:flex;align-items:flex-start;gap:12px}.section-title{min-width:0}.section-title h3{font-size:17px;margin:0 0 5px}.section-title p{margin:0;color:var(--muted);line-height:1.55}.section-action{margin-left:auto;display:flex;gap:8px;align-items:center}.rows{padding:2px 0}.row{display:grid;grid-template-columns:1fr minmax(220px,340px);gap:18px;align-items:center;padding:15px 20px;border-top:1px solid var(--line-soft);min-height:64px}.rows .row:first-child{border-top:0}.row-title{font-weight:700;margin-bottom:4px}.row-desc{color:var(--muted);line-height:1.45;font-size:13px}.control{display:flex;align-items:center;justify-content:flex-end;gap:9px;min-width:0}.input,.select,select{height:36px;border-radius:12px;border:1px solid #34343a;background:#101012;color:#f3f3f4;padding:0 12px;outline:none;min-width:150px}.input{width:100%}.control .input.small-input{width:104px;min-width:104px;text-align:center}.switch{position:relative;display:inline-block;width:46px;height:26px;flex:0 0 auto}.switch input{opacity:0;width:0;height:0}.switch span{position:absolute;cursor:pointer;inset:0;background:#34343a;border-radius:999px;transition:.18s;border:1px solid #45454c}.switch span:before{content:"";position:absolute;width:20px;height:20px;left:2px;top:2px;background:#d9d9dc;border-radius:50%;transition:.18s;box-shadow:0 2px 8px rgba(0,0,0,.32)}.switch input:checked + span{background:#f1f1f2;border-color:#fff}.switch input:checked + span:before{transform:translateX(20px);background:#111}
    .seg{display:inline-flex;background:#101012;border:1px solid var(--line);border-radius:13px;padding:3px}.seg button{border:0;background:transparent;color:var(--muted);height:30px;padding:0 11px;border-radius:10px;font-weight:650}.seg button.active{background:#f4f4f5;color:#111}
    .table{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden;border-radius:16px;border:1px solid var(--line);}.table th,.table td{text-align:left;border-bottom:1px solid var(--line-soft);padding:12px 14px;color:#d8d8dc}.table th{font-size:12px;color:#9c9ca3;background:#18181b;font-weight:700}.table tr:last-child td{border-bottom:0}.kbd{display:inline-flex;align-items:center;gap:3px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;border:1px solid #3a3a40;background:#111113;color:#eee;border-radius:8px;padding:4px 7px;font-size:12px}.kbd.empty{color:#777}.mini-list{display:flex;flex-direction:column;gap:10px}.mini-item{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line-soft);background:#151518;border-radius:16px}.mini-icon{width:38px;height:38px;border-radius:12px;background:#24242a;display:grid;place-items:center;font-size:18px;flex:0 0 auto}.mini-main{min-width:0}.mini-main strong{display:block}.mini-main span{display:block;color:var(--muted);font-size:12px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.mini-right{margin-left:auto;display:flex;align-items:center;gap:8px}.meter{height:8px;background:#2a2a30;border-radius:999px;overflow:hidden}.meter i{display:block;height:100%;border-radius:999px;background:#eaeaec;width:var(--w,50%)}.code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.7;background:#0f0f11;border:1px solid var(--line);border-radius:16px;padding:14px;color:#dcdce0;white-space:pre-wrap;overflow:auto}.preview-card{height:180px;border-radius:18px;background:linear-gradient(135deg,#333840,#15161a 55%,#0f1012);border:1px solid #3a3d43;position:relative;overflow:hidden}.preview-card:before{content:"PNG";position:absolute;top:12px;left:12px;background:#16171a;color:#fff;border-radius:999px;padding:5px 9px;font-size:11px;font-weight:800}.preview-card:after{content:"公爵 · image 2 · 2752×1536";position:absolute;left:14px;bottom:14px;color:#fff;text-shadow:0 1px 12px rgba(0,0,0,.9);font-weight:700}.field-stack{display:flex;flex-wrap:wrap;gap:8px}.danger-zone{border-color:rgba(255,139,139,.28);background:rgba(255,139,139,.04)}.danger-zone .section-head{border-bottom-color:rgba(255,139,139,.18)}.danger-zone h3{color:#ffb2b2}.subgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.hint{font-size:12px;color:var(--subtle);margin-top:8px}.placeholder{border:1px dashed #3a3a40;border-radius:18px;padding:18px;color:#a7a7ad;background:#111113}.provider{display:grid;grid-template-columns:42px 1fr auto;align-items:center;gap:12px}.provider .mini-icon{width:42px;height:42px}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.badge-dot{width:8px;height:8px;border-radius:50%;display:inline-block;background:#8b8b93}.badge-dot.good{background:var(--good)}.badge-dot.warn{background:var(--warn)}.badge-dot.danger{background:var(--danger)}
    @media(max-width:1100px){:root{--sidebar:252px}.grid.cols-4{grid-template-columns:repeat(2,1fr)}.grid.cols-3{grid-template-columns:repeat(2,1fr)}.row{grid-template-columns:1fr}.control{justify-content:flex-start}.top-actions{display:none}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="window-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      <div class="brand">
        <div class="brand-mark">PS</div>
        <div><h1>PromptStudio</h1><p>设置中心 · 本地优先</p></div>
      </div>
      <div class="side-search"><input id="navSearch" placeholder="搜索设置页面…" /></div>
      <nav id="nav" class="nav"></nav>
      <div class="sidebar-footer">
        <div class="library-pill">
          <span class="pulse"></span>
          <div><strong>PromptStudio Library</strong><span>/Users/you/PromptStudio.library</span></div>
        </div>
      </div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div class="crumb"><span>设置</span><span>›</span><strong id="crumbTitle">设置首页</strong></div>
        <div class="divider"></div>
        <div class="global-search"><input placeholder="全局搜索：模型、标签、备份、快捷键…" /></div>
        <div class="top-actions">
          <button class="btn ghost">恢复默认</button>
          <button class="btn primary">保存设置</button>
        </div>
      </header>
      <div class="content"><div id="page" class="page"></div></div>
    </main>
  </div>

<script>
const navGroups = [
  {title:'概览', items:[['home','⌂','设置首页','状态']]},
  {title:'基础', items:[['general','⚙','通用','应用'],['library','▣','素材库与存储','库级'],['import','⤓','导入与采集','工作流'],['taxonomy','☷','分类与标签','库级']]},
  {title:'Prompt 工作流', items:[['editor','✎','Prompt 编辑器','核心'],['models','◆','模型与 API','核心'],['run','▶','生成与运行','核心'],['search','⌕','搜索与索引','核心'],['preview','◫','卡片与预览','界面']]},
  {title:'系统', items:[['shortcuts','⌨','快捷键','效率'],['backup','⇪','导出、备份与同步','安全'],['privacy','◉','隐私与安全','安全'],['plugins','⌬','插件与自动化','高级'],['advanced','⚒','高级与诊断','维护']]}
];
const meta = Object.fromEntries(navGroups.flatMap(g=>g.items.map(i=>[i[0],{icon:i[1],label:i[2],badge:i[3],group:g.title}])));

function chip(text, cls=''){ return `<span class="chip ${cls}">${text}</span>`; }
function btn(text, cls='ghost'){ return `<button class="btn ${cls}">${text}</button>`; }
function smallBtn(text, cls='ghost'){ return `<button class="btn small ${cls}">${text}</button>`; }
function toggle(on=true){ return `<label class="switch"><input type="checkbox" ${on?'checked':''}><span></span></label>`; }
function select(opts){ return `<select>${opts.map((o,i)=>`<option ${i===0?'selected':''}>${o}</option>`).join('')}</select>`; }
function input(value='', cls=''){ return `<input class="input ${cls}" value="${value}" />`; }
function row(title, desc, control){ return `<div class="row"><div><div class="row-title">${title}</div><div class="row-desc">${desc}</div></div><div class="control">${control}</div></div>`; }
function section(title, desc, rows, action=''){ return `<section class="section"><div class="section-head"><div class="section-title"><h3>${title}</h3><p>${desc}</p></div><div class="section-action">${action}</div></div><div class="rows">${rows}</div></section>`; }
function danger(title, desc, rows){ return `<section class="section danger-zone"><div class="section-head"><div class="section-title"><h3>${title}</h3><p>${desc}</p></div></div><div class="rows">${rows}</div></section>`; }
function hero(title, desc, chips=''){ return `<div class="hero"><h2>${title}</h2><p>${desc}</p><div class="hero-meta">${chips}</div></div>`; }
function stat(title,value,desc,cls=''){ return `<div class="card"><h3>${title}</h3><div class="stat-value">${value}</div><div class="stat-caption">${desc}</div>${cls?`<div class="hint">${cls}</div>`:''}</div>`; }
function mini(icon,title,desc,right=''){ return `<div class="mini-item"><div class="mini-icon">${icon}</div><div class="mini-main"><strong>${title}</strong><span>${desc}</span></div><div class="mini-right">${right}</div></div>`; }
function seg(items,active=0){ return `<div class="seg">${items.map((x,i)=>`<button class="${i===active?'active':''}">${x}</button>`).join('')}</div>`; }
function code(t){ return `<pre class="code">${t}</pre>`; }

const pages = {
  home(){ return hero('设置首页','把设置中心设计成 Prompt 工作流中控台：先让用户确认库是否安全、索引是否健康、模型是否可用，然后再进入具体配置。', chip('本地优先','good')+chip('当前库级设置')+chip('15 个设置页面','info')) + `
    <div class="grid cols-4">
      ${stat('Prompt 数量','3,214','当前库内已整理 Prompt')}
      ${stat('附件素材','8,920','图片、参考板、工作流文件')}
      ${stat('库大小','2.4 GB','数据库 128 MB，附件 2.1 GB')}
      ${stat('上次备份','今天 14:06','自动备份状态正常','下一次：今晚 22:00')}
    </div>
    <div class="grid cols-2" style="margin-top:16px">
      <div class="card"><h3>库健康状态</h3><div class="mini-list">
        ${mini('✓','全文索引正常','3,214 条 Prompt 已索引',chip('正常','good'))}
        ${mini('↻','语义索引待更新','有 42 条新 Prompt 未加入向量索引',smallBtn('立即更新'))}
        ${mini('⚠','疑似重复项','发现 18 组高度相似 Prompt',smallBtn('查看'))}
        ${mini('◌','缓存占用','缩略图 420 MB，临时文件 36 MB',smallBtn('清理'))}
      </div></div>
      <div class="card"><h3>模型与隐私状态</h3><div class="mini-list">
        ${mini('◆','默认图像模型','image 2 · 16:9 · 高质量模式',chip('可用','good'))}
        ${mini('●','本地模型','Ollama 已连接，ComfyUI 未启动',chip('部分可用','warn'))}
        ${mini('◉','本地优先模式','云端语义搜索和遥测已关闭',chip('已开启','good'))}
        ${mini('🔑','API Key 存储','已使用系统钥匙串保存密钥',chip('安全','good'))}
      </div></div>
    </div>
    ${section('快捷操作','把维护动作放在首页，让用户不必进入深层设置。',
      row('立即备份当前库','生成一个包含数据库、附件、缩略图索引的完整备份包。',btn('立即备份','primary')+btn('打开备份目录'))+
      row('重建索引','当搜索结果不准、导入大量文件或标签规则变更后使用。',btn('重建全文索引')+btn('重建语义索引'))+
      row('清理缓存','清理缩略图、临时生成结果和过期运行日志，不影响原始 Prompt。',btn('清理缓存'))+
      row('打开库文件夹','在系统文件管理器中打开当前 PromptStudio Library。',btn('打开文件夹'))
    )}
    ${section('推荐待办','根据库状态给出下一步建议。',
      row('为 42 条新 Prompt 生成语义索引','启用后可以使用“找相似 Prompt”和自然语言搜索。',smallBtn('处理','primary'))+
      row('为 18 组疑似重复 Prompt 做合并','重复判断基于归一化文本和语义相似度。',smallBtn('查看重复项'))+
      row('设置自动备份保留策略','当前保留最近 10 份，建议同时保留最近 30 天。',smallBtn('前往设置'))
    )}`; },

  general(){ return hero('通用','设置启动、语言、默认动作、删除行为和更新策略。通用设置属于应用级，不随库切换变化。', chip('应用级')+chip('P0','good')) +
    section('基础偏好','让用户控制应用启动和常用行为。',
      row('启动时打开','决定启动 PromptStudio 后默认进入哪个视图。',select(['上次使用的库','指定库','空白首页']))+
      row('默认新建位置','新建 Prompt 时默认保存到哪里。',select(['当前选中文件夹','待整理','指定文件夹…']))+
      row('界面语言','当前原型以简体中文为主，后续可扩展英文。',select(['简体中文','English']))+
      row('主题外观','参考当前截图，建议第一版先做深色主题。',seg(['跟随系统','深色','浅色'],1))
    )+
    section('操作行为','把高频动作变成可配置规则。',
      row('双击卡片时','卡片双击是素材管理工具的核心效率入口。',select(['打开详情面板','进入编辑模式','复制 Prompt','运行测试']))+
      row('复制 Prompt 后显示提示','复制成功后在右上角出现轻提示。',toggle(true))+
      row('删除前二次确认','删除 Prompt、文件夹或版本前弹出确认。',toggle(true))+

function renderNav(filter=''){
  const q = filter.trim().toLowerCase();
  document.getElementById('nav').innerHTML = navGroups.map(group => {
    const items = group.items.filter(i => !q || `${i[2]} ${i[3]} ${group.title}`.toLowerCase().includes(q));
    if(!items.length) return '';
    return `<div class="nav-group"><div class="nav-group-title">${group.title}</div>` + items.map(i =>
      `<a class="nav-item" data-key="${i[0]}" href="#${i[0]}"><span class="nav-icon">${i[1]}</span><span class="nav-label">${i[2]}</span><span class="nav-badge">${i[3]}</span></a>`
    ).join('') + `</div>`;
  }).join('');
  markActive();
}
function currentKey(){ return location.hash.replace('#','') || 'home'; }
function markActive(){ const key=currentKey(); document.querySelectorAll('.nav-item').forEach(a=>a.classList.toggle('active',a.dataset.key===key)); }
function render(){
  let key = currentKey(); if(!pages[key]) key='home';
  document.getElementById('crumbTitle').textContent = meta[key].label;
  document.getElementById('page').innerHTML = pages[key]();
  markActive();
  document.title = `PromptStudio 设置 - ${meta[key].label}`;
}
window.addEventListener('hashchange', render);
document.getElementById('navSearch').addEventListener('input', e => renderNav(e.target.value));
renderNav(); render();
</script>
